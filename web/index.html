<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoardNova - Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo">BoardNova</div>
                <div class="divider"></div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span id="connectionStatus">Connected to Server</span>
                </div>
            </div>
            
            <div class="nav-right">
                <div class="user-info">
                    <span id="displayUsername">Guest</span>
                    <div class="avatar"></div>
                </div>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </nav>

        <main class="workspace">
            <!-- Sidebar Toolbar -->
            <aside class="toolbar">
                <div class="tool-section">
                    <p class="tool-label">Tools</p>
                    <div class="tool-group">
                        <button class="tool-btn active" id="penTool" title="Pen">🖋️</button>
                        <button class="tool-btn" id="eraserTool" title="Eraser">🧽</button>
                    </div>
                </div>

                <div class="tool-section">
                    <p class="tool-label">Appearance</p>
                    <div class="tool-group col">
                        <div class="picker-item">
                            <label>Color</label>
                            <input type="color" id="colorPicker" value="#38bdf8">
                        </div>
                        <div class="picker-item">
                            <label>Size: <span id="sizeVal">5</span>px</label>
                            <input type="range" id="sizePicker" min="1" max="50" value="5">
                        </div>
                    </div>
                </div>

                <div class="tool-section actions">
                    <button class="btn-action" id="undoBtn">↩️ Undo</button>
                    <button class="btn-action" id="clearBtn">🧹 Clear</button>
                    <button class="btn-primary" id="saveBtn">💾 Save PNG</button>
                </div>
            </aside>

            <!-- Drawing Area -->
            <section class="canvas-wrapper">
                <canvas id="whiteboard"></canvas>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
